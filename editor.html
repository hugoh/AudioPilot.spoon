<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Audio Device Priorities</title>
    <script src="vendor/Sortable.min.js"></script>
    <style>
    :root {
      color-scheme: light dark;
    }
    body {
      font: -apple-system-body;
      padding: 16px;
      -webkit-user-select: none;
    }
    label {
      color: GrayText;
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin: 10px 0 3px;
      text-transform: uppercase;
    }
    article {
      border: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
      border-radius: 8px;
      margin-bottom: 12px;
      padding: 0;
    }
    .item {
      align-items: center;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 10%, transparent);
      display: flex;
      gap: 8px;
      padding: 7px 12px;
    }
    .item:last-child {
      border-bottom: none;
    }
    .pi {
      cursor: grab;
    }
    .pi:active {
      cursor: grabbing;
    }
    .handle {
      color: GrayText;
      flex-shrink: 0;
      font-size: 12px;
    }
    .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty {
      color: GrayText;
      font-style: italic;
      padding: 10px 12px;
    }
    .btn {
      all: unset;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 15px;
      padding: 0 2px;
    }
    .rbtn {
      color: #e53935;
    }
    .abtn {
      color: AccentColor;
    }
    .fbtn {
      font-size: 13px;
      opacity: 0.5;
    }
    .fbtn:hover {
      opacity: 1;
    }
    footer {
      border-top: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
      padding-top: 12px;
    }
    </style>
  </head>
  <body>
    <h3>Audio Device Priorities</h3>
    <label>Output Priority</label>
    <article id="op"></article>
    <label>Other Known Output Devices</label>
    <article id="ou"></article>
    <label>Input Priority</label>
    <article id="ip"></article>
    <label>Other Known Input Devices</label>
    <article id="iu"></article>
    <footer>
      <button id="cc">Cancel</button>
      <button id="sc">Save</button>
    </footer>
    <script>
    const raw = window.__initialState || {
        output: { priority: [], unranked: [] },
        input: { priority: [], unranked: [] },
      };

      // Lists are tracked by device uid; `names` maps uid -> display name. The
      // injected state is { uid, name } objects; flatten to uid arrays here.
      const names = {};
      function toUids(list) {
        return (list || []).map((d) => {
          names[d.uid] = d.name;
          return d.uid;
        });
      }
      const state = {
        output: {
          priority: toUids(raw.output.priority),
          unranked: toUids(raw.output.unranked),
        },
        input: {
          priority: toUids(raw.input.priority),
          unranked: toUids(raw.input.unranked),
        },
      };

      // Devices the user removed from "Other Known Devices"; committed on Save.
      const forgotten = { output: [], input: [] };

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function getOrder(id) {
        return [...document.getElementById(id).querySelectorAll(".pi")].map(
          (e) => e.dataset.uid,
        );
      }

      function syncDOM() {
        state.output.priority = getOrder("op");
        state.input.priority = getOrder("ip");
      }

      function render(id, uids, type, pri) {
        const el = document.getElementById(id);
        el.innerHTML = "";
        if (!uids.length) {
          el.innerHTML =
            '<div class="empty">' +
            (pri ? "No devices ranked yet" : "No other known devices") +
            "</div>";
          return;
        }
        uids.forEach((uid) => {
          const d = document.createElement("div");
          d.className = "item" + (pri ? " pi" : "");
          d.dataset.uid = uid;
          const label = esc(names[uid] || uid);
          if (pri) {
            d.innerHTML =
              '<span class="handle">⠿</span><span class="name">' +
              label +
              '</span><button class="btn rbtn" title="Remove">✕</button>';
            d.querySelector(".rbtn").addEventListener("click", () => {
              syncDOM();
              state[type].priority = state[type].priority.filter(
                (x) => x !== uid,
              );
              state[type].unranked.push(uid);
              renderAll();
            });
          } else {
            d.innerHTML =
              '<span class="name">' +
              label +
              '</span><button class="btn abtn" title="Add to priority">＋</button>' +
              '<button class="btn fbtn" title="Forget this device">🗑</button>';
            d.querySelector(".abtn").addEventListener("click", () => {
              syncDOM();
              state[type].unranked = state[type].unranked.filter(
                (x) => x !== uid,
              );
              state[type].priority.push(uid);
              renderAll();
            });
            d.querySelector(".fbtn").addEventListener("click", () => {
              syncDOM();
              state[type].unranked = state[type].unranked.filter(
                (x) => x !== uid,
              );
              forgotten[type].push(uid);
              renderAll();
            });
          }
          el.appendChild(d);
        });
      }

      let sortableOP = null;
      let sortableIP = null;

      function renderAll() {
        render("op", state.output.priority, "output", true);
        render("ou", state.output.unranked, "output", false);
        render("ip", state.input.priority, "input", true);
        render("iu", state.input.unranked, "input", false);
        if (sortableOP) sortableOP.destroy();
        if (sortableIP) sortableIP.destroy();
        const sortableOpts = {
          animation: 150,
          handle: ".handle",
          // WKWebView does not support the native HTML5 drag-and-drop API that
          // Sortable uses by default; forceFallback uses pointer events instead.
          forceFallback: true,
        };
        sortableOP = new Sortable(document.getElementById("op"), sortableOpts);
        sortableIP = new Sortable(document.getElementById("ip"), sortableOpts);
      }

      document.getElementById("sc").addEventListener("click", () => {
        webkit.messageHandlers.AudioPilotEditor.postMessage({
          action: "save",
          outputPriority: getOrder("op"),
          inputPriority: getOrder("ip"),
          forgetOutput: forgotten.output,
          forgetInput: forgotten.input,
        });
      });

      document.getElementById("cc").addEventListener("click", () => {
        webkit.messageHandlers.AudioPilotEditor.postMessage({
          action: "cancel",
        });
      });

      renderAll();
    </script>
  </body>
</html>
