<!DOCTYPE html>
<html data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Audio Device Priorities</title>
    <link rel="stylesheet" href="vendor/pico.classless.min.css" />
    <script src="vendor/Sortable.min.js"></script>
    <style>
    body {
      -webkit-user-select: none;
      font-size: 13px;
      padding: 16px;
    }
    h1 {
      font-size: 17px;
      margin-bottom: 14px;
    }
    .lbl {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--pico-muted-color);
      letter-spacing: 0.05em;
      margin: 10px 0 3px;
    }
    article {
      padding: 0;
      margin-bottom: 0;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    .item:last-child {
      border-bottom: none;
    }
    .pi {
      cursor: grab;
    }
    .pi:active {
      cursor: grabbing;
    }
    .handle {
      color: var(--pico-muted-color);
      font-size: 12px;
      flex-shrink: 0;
    }
    .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty {
      padding: 10px 12px;
      color: var(--pico-muted-color);
      font-style: italic;
    }
    .btn {
      background: none;
      border: none;
      box-shadow: none;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 15px;
      line-height: 1;
      margin: 0;
      padding: 0 2px;
    }
    .rbtn {
      color: var(--pico-del-color, #c00);
    }
    .abtn {
      color: var(--pico-primary);
    }
    .footer {
      border-top: 1px solid var(--pico-muted-border-color);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 14px;
      padding-top: 12px;
    }
    .footer button {
      margin-bottom: 0;
      width: auto;
    }
    </style>
  </head>
  <body>
    <h1>Audio Device Priorities</h1>
    <div class="lbl">Output Priority</div>
    <article id="op"></article>
    <div class="lbl">Other Known Output Devices</div>
    <article id="ou"></article>
    <div class="lbl" style="margin-top: 14px">Input Priority</div>
    <article id="ip"></article>
    <div class="lbl">Other Known Input Devices</div>
    <article id="iu"></article>
    <div class="footer">
      <button id="cc" class="secondary">Cancel</button>
      <button id="sc">Save</button>
    </div>
    <script>
    const state = window.__initialState || {
        output: { priority: [], unranked: [] },
        input: { priority: [], unranked: [] },
      };

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function getOrder(id) {
        return [...document.getElementById(id).querySelectorAll(".pi")].map(
          (e) => e.dataset.name,
        );
      }

      function syncDOM() {
        state.output.priority = getOrder("op");
        state.input.priority = getOrder("ip");
      }

      function render(id, items, type, pri) {
        const el = document.getElementById(id);
        el.innerHTML = "";
        if (!items.length) {
          el.innerHTML =
            '<div class="empty">' +
            (pri ? "No devices ranked yet" : "No other known devices") +
            "</div>";
          return;
        }
        items.forEach((n) => {
          const d = document.createElement("div");
          d.className = "item" + (pri ? " pi" : "");
          d.dataset.name = n;
          if (pri) {
            d.innerHTML =
              '<span class="handle">⠿</span><span class="name">' +
              esc(n) +
              '</span><button class="btn rbtn" title="Remove">✕</button>';
            d.querySelector(".rbtn").addEventListener("click", () => {
              syncDOM();
              state[type].priority = state[type].priority.filter(
                (x) => x !== n,
              );
              state[type].unranked.push(n);
              renderAll();
            });
          } else {
            d.innerHTML =
              '<span class="name">' +
              esc(n) +
              '</span><button class="btn abtn" title="Add to priority">＋</button>';
            d.querySelector(".abtn").addEventListener("click", () => {
              syncDOM();
              state[type].unranked = state[type].unranked.filter(
                (x) => x !== n,
              );
              state[type].priority.push(n);
              renderAll();
            });
          }
          el.appendChild(d);
        });
      }

      let sortableOP = null;
      let sortableIP = null;

      function renderAll() {
        render("op", state.output.priority, "output", true);
        render("ou", state.output.unranked, "output", false);
        render("ip", state.input.priority, "input", true);
        render("iu", state.input.unranked, "input", false);
        if (sortableOP) sortableOP.destroy();
        if (sortableIP) sortableIP.destroy();
        sortableOP = new Sortable(document.getElementById("op"), {
          animation: 150,
          handle: ".handle",
        });
        sortableIP = new Sortable(document.getElementById("ip"), {
          animation: 150,
          handle: ".handle",
        });
      }

      document.getElementById("sc").addEventListener("click", () => {
        webkit.messageHandlers.AutoAudioSwitcherEditor.postMessage({
          action: "save",
          outputPriority: getOrder("op"),
          inputPriority: getOrder("ip"),
        });
      });

      document.getElementById("cc").addEventListener("click", () => {
        webkit.messageHandlers.AutoAudioSwitcherEditor.postMessage({
          action: "cancel",
        });
      });

      renderAll();
    </script>
  </body>
</html>
