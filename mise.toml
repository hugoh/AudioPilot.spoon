[tools]
node = "lts"
"github:orhun/git-cliff" = "2.13.1"
actionlint = "1.7.12"
biome = "2.5.4"
pinact = "4.1.0"
ghalint = "1.5.6"
gitleaks = "8.30.1"
hk = "1.51.0"
lua = "5.4"
uv = "0.11.29"
rumdl = "0.2.35"
stylua = "2.5.2"
tombi = "1.2.2"
typos = "1.48.0"
"github:owenlamont/ryl" = "0.21.0"
zizmor = "1.27.0"

[tasks.docs]
run = "uvx --from git+https://github.com/hugoh/spoon-tools spoon-generate-docs"
description = "Generate docs/docs.json and docs/index.html from docstrings"

[tasks.vendor]
run = [
  "npm install",
  "rm -rf vendor",
  "mkdir -p vendor",
  "cp node_modules/sortablejs/Sortable.min.js vendor/Sortable.min.js",
]
description = "Fetch CSS/JS dependencies into vendor/"

[tasks.package]
depends = ["docs"]
run = """
mise run vendor
rm -rf dist
mkdir -p dist/AudioPilot.spoon
cp init.lua editor.html LICENSE README.md docs/docs.json dist/AudioPilot.spoon/
cp -r vendor dist/AudioPilot.spoon/
cd dist
zip -r ../AudioPilot.spoon.zip AudioPilot.spoon
cd ..
rm -rf dist
"""
description = "Build a self-contained AudioPilot.spoon.zip (includes docs.json)"

[tasks.test]
run = "busted test_spec.lua --verbose"

[hooks]
postinstall = ["luarocks install busted", "luarocks install luacheck"]

[settings]
experimental = true
