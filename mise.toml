[tools]
node = "lts"
"github:orhun/git-cliff" = "latest"
actionlint = "latest"
dprint = "latest"
ghalint = "latest"
gitleaks = "latest"
hk = "latest"
lua = "5.4"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
stylua = "latest"
taplo = "latest"
tombi = "latest"
typos = "latest"
# yamllint = "latest"
zizmor = "latest"

[tasks.vendor]
run = [
  "npm install",
  "rm -rf vendor",
  "mkdir -p vendor",
  "cp node_modules/sortablejs/Sortable.min.js vendor/Sortable.min.js",
]
description = "Fetch CSS/JS dependencies into vendor/"

[tasks.package]
run = """
mise run vendor
rm -rf dist
mkdir -p dist/AudioPilot.spoon
cp init.lua editor.html LICENSE README.md dist/AudioPilot.spoon/
cp -r vendor dist/AudioPilot.spoon/
cd dist
zip -r ../AudioPilot.spoon.zip AudioPilot.spoon
cd ..
rm -rf dist
"""
description = "Build a self-contained AudioPilot.spoon.zip"

[tasks.test]
run = "busted test_spec.lua --verbose"

[hooks]
postinstall = ["luarocks install busted", "luarocks install luacheck"]

[settings]
experimental = true # for hooks

[env]
HK_PKL_BACKEND = "pklr"
